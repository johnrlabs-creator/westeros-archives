<div
  class="min-h-screen w-full bg-stone-950 font-serif selection:bg-amber-600/20 selection:text-amber-400 flex flex-col justify-between p-4 md:p-8"
>
  <div class="flex-1 flex flex-col items-center justify-center py-12">
    @if (!register()) {
      <!-- LOGIN VIEW -->
      <div
        class="w-full max-w-md bg-stone-900/40 border border-stone-800 rounded-sm shadow-[0_20px_50px_rgba(0,0,0,0.9)] overflow-hidden backdrop-blur-sm animate-fadeIn"
      >
        <!-- Card Header -->
        <div
          class="bg-gradient-to-b from-stone-900 to-stone-950 px-6 py-8 border-b border-stone-800 text-center relative"
        >
          <div
            class="absolute inset-x-0 bottom-0 h-[1px] bg-gradient-to-r from-transparent via-amber-600/30 to-transparent"
          ></div>
          <span
            class="uppercase tracking-widest text-[10px] text-amber-600 font-bold block mb-1 select-none"
            >Archives</span
          >
          <h2 class="text-xl font-medium tracking-widest text-stone-100 uppercase">
            Enter your scroll data
          </h2>
        </div>

        <form
          [formGroup]="loginForm"
          (submit)="onLogin()"
          class="p-6 sm:p-8 space-y-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-stone-900/60 via-stone-950 to-stone-950"
        >
          <!-- Username Input -->
          <div class="space-y-2 group">
            <label
              class="block uppercase tracking-widest text-[9px] text-stone-500 font-bold font-serif select-none transition-colors group-focus-within:text-amber-600/80"
              >Alias/Username</label
            >
            <input
              [class.form-error]="
                loginForm.get('username')?.invalid && loginForm.get('username')?.touched
              "
              formControlName="username"
              type="text"
              required
              placeholder="e.g., JohnSnow143"
              class="w-full bg-stone-950/80 border border-stone-800 text-stone-200 text-xs font-serif tracking-wide placeholder:text-stone-700 rounded-sm pl-4 pr-4 py-3 focus:outline-none focus:border-amber-600/60 focus:bg-stone-950 focus:shadow-[0_0_15px_rgba(217,119,6,0.08)] transition-all duration-300"
            />
          </div>

          <!-- Password Input -->
          <div class="space-y-2 group">
            <label
              class="block uppercase tracking-widest text-[9px] text-stone-500 font-bold font-serif select-none transition-colors group-focus-within:text-amber-600/80"
              >Citadel Passkey/Password</label
            >
            <input
              [class.form-error]="
                loginForm.get('password')?.invalid && loginForm.get('password')?.touched
              "
              formControlName="password"
              type="password"
              required
              placeholder="••••••••"
              class="w-full bg-stone-950/80 border border-stone-800 text-stone-200 text-xs tracking-widest placeholder:text-stone-800 rounded-sm pl-4 pr-4 py-3 focus:outline-none focus:border-amber-600/60 focus:bg-stone-950 focus:shadow-[0_0_15px_rgba(217,119,6,0.08)] transition-all duration-300"
            />
          </div>

          <!-- Primary Submit Action -->
          <div class="pt-2">
            <button
              [disabled]="isLoading()"
              type="submit"
              class="w-full px-4 py-3.5 bg-stone-950 text-amber-500 hover:text-amber-400 disabled:opacity-30 text-xs font-serif uppercase tracking-widest font-semibold border border-stone-800 hover:border-amber-600 active:bg-stone-900 transition-all duration-300 focus:outline-none focus:ring-1 focus:ring-amber-500 rounded-sm shadow-lg"
            >
              Summon Records / Login →
            </button>
          </div>

          <!-- Toggle to Register Link -->
          <div class="text-center pt-2 border-t border-stone-900/60">
            <p class="text-[10px] tracking-wider uppercase text-stone-500 font-sans">
              New to the order?
              <button
                type="button"
                (click)="switchView()"
                class="ml-1 text-stone-400 hover:text-amber-500 underline underline-offset-4 decoration-stone-800 hover:decoration-amber-600/50 transition-all focus:outline-none font-serif tracking-widest font-semibold uppercase"
              >
                Request a scroll / Register
              </button>
            </p>
          </div>
        </form>
      </div>
    } @else {
      <!-- REGISTER VIEW -->
      <div
        class="w-full max-w-md bg-stone-900/40 border border-stone-800 rounded-sm shadow-[0_20px_50px_rgba(0,0,0,0.9)] overflow-hidden backdrop-blur-sm animate-fadeIn"
      >
        <!-- Card Header -->
        <div
          class="bg-gradient-to-b from-stone-900 to-stone-950 px-6 py-8 border-b border-stone-800 text-center relative"
        >
          <div
            class="absolute inset-x-0 bottom-0 h-[1px] bg-gradient-to-r from-transparent via-amber-600/30 to-transparent"
          ></div>
          <span
            class="uppercase tracking-widest text-[10px] text-amber-600 font-bold block mb-1 select-none"
            >Enlistment Ledger</span
          >
          <h2 class="text-xl font-medium tracking-widest text-stone-100 uppercase">
            Forge Your Seal
          </h2>
        </div>

        <form
          [formGroup]="registerForm"
          (submit)="onRegister()"
          class="p-6 sm:p-8 space-y-5 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-stone-900/60 via-stone-950 to-stone-950"
        >
          <!-- Username Input -->
          <div class="space-y-1.5 group">
            <label
              class="block uppercase tracking-widest text-[9px] text-stone-500 font-bold font-serif select-none transition-colors group-focus-within:text-amber-600/80"
              >Chosen Alias/Username</label
            >
            <input
              [class.form-error]="
                registerForm.get('username')?.invalid && registerForm.get('username')?.touched
              "
              formControlName="username"
              type="text"
              required
              placeholder="e.g., JonSnow143"
              class="w-full bg-stone-950/80 border border-stone-800 text-stone-200 text-xs font-serif tracking-wide placeholder:text-stone-700 rounded-sm pl-4 pr-4 py-2.5 focus:outline-none focus:border-amber-600/60 focus:bg-stone-950 focus:shadow-[0_0_15px_rgba(217,119,6,0.08)] transition-all duration-300"
            />
          </div>

          <!-- Password Input -->
          <div class="space-y-1.5 group">
            <label
              class="block uppercase tracking-widest text-[9px] text-stone-500 font-bold font-serif select-none transition-colors group-focus-within:text-amber-600/80"
              >Citadel Passkey / Password</label
            >
            <input
              [class.form-error]="
                registerForm.get('password')?.invalid && registerForm.get('password')?.touched
              "
              formControlName="password"
              type="password"
              required
              placeholder="A minimum of 5 characters is required"
              class="w-full bg-stone-950/80 border border-stone-800 text-stone-200 text-xs tracking-widest placeholder:text-stone-800 rounded-sm pl-4 pr-4 py-2.5 focus:outline-none focus:border-amber-600/60 focus:bg-stone-950 focus:shadow-[0_0_15px_rgba(217,119,6,0.08)] transition-all duration-300"
            />
          </div>

          <div class="pt-2">
            <button
              [disabled]="isLoading()"
              type="submit"
              class="w-full px-4 py-3.5 bg-stone-950 text-amber-500 hover:text-amber-400 disabled:opacity-30 text-xs font-serif uppercase tracking-widest font-semibold border border-stone-800 hover:border-amber-600 active:bg-stone-900 transition-all duration-300 focus:outline-none focus:ring-1 focus:ring-amber-500 rounded-sm shadow-lg"
            >
              Inscribe Seal / Register
            </button>
          </div>

          <!-- Toggle to Login Link -->
          <div class="text-center pt-2 border-t border-stone-900/60">
            <p class="text-[10px] tracking-wider uppercase text-stone-500 font-sans">
              Already sworn?
              <button
                type="button"
                (click)="register.set(false)"
                class="ml-1 text-stone-400 hover:text-amber-500 underline underline-offset-4 decoration-stone-800 hover:decoration-amber-600/50 transition-all focus:outline-none font-serif tracking-widest font-semibold uppercase"
              >
                Return to Gates / Login
              </button>
            </p>
          </div>
        </form>
      </div>
    }
  </div>
</div>
