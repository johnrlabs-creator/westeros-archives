@if (toastService.toast(); as toast) {
  <div 
    class="fixed top-5 right-5 z-50 w-full max-w-sm bg-stone-950 border border-stone-800 rounded-sm shadow-[0_15px_45px_rgba(0,0,0,0.95)] overflow-hidden font-serif animate-slideIn selection:bg-amber-600/20 selection:text-amber-400"
  >
    <!-- Left Accent -->
    <div
      [class.bg-amber-600]="toast.type === 'success'"
      [class.bg-stone-600]="toast.type === 'info'"
      [class.bg-red-900]="toast.type === 'error'"
      class="absolute left-0 top-0 bottom-0 w-1 shadow-[0_0_12px_rgba(217,119,6,0.25)]"
    ></div>

    <!-- Inner Core Layout -->
    <div class="p-4 pl-6 flex items-start justify-between gap-4 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-stone-900 via-stone-950 to-black">
      
      <!-- Content Section -->
      <div class="flex-1">
        <span class="uppercase tracking-widest text-[9px] text-amber-600 font-bold block mb-0.5 select-none">
          {{ toast.type === 'success' ? 'Raven Dispatch' : 'Citadel Alert' }}
        </span>
        <p class="text-stone-200 text-sm tracking-wide font-medium leading-relaxed">
          {{ toast.message }}
        </p>
      </div>

      <!-- Dismiss Action Button -->
      <button 
        (click)="toastService.dismiss()" 
        class="text-stone-500 hover:text-amber-500 text-xs transition-colors duration-200 focus:outline-none px-1 select-none"
      >
        ✕
      </button>

    </div>
  </div>
}
